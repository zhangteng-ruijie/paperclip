name: Upstream Sync PR

on:
  pull_request:
    branches:
      - zh-enterprise

concurrency:
  group: upstream-sync-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    if: startsWith(github.head_ref, 'bot-upgrade/')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      BASE_BRANCH: zh-enterprise
      MAINTENANCE_REF: HEAD
      UPSTREAM_REF: upstream/master

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure upstream remote
        run: |
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/paperclipai/paperclip.git
          else
            git remote add upstream https://github.com/paperclipai/paperclip.git
          fi

      - name: Fetch sync refs
        run: |
          git fetch --no-tags upstream master:refs/remotes/upstream/master
          git fetch --no-tags origin zh-enterprise:refs/remotes/origin/zh-enterprise

      - name: Regenerate upstream sync report artifacts
        id: regenerate
        continue-on-error: true
        run: pnpm sync:upstream -- --dry-run --maintenance-ref HEAD

      - name: Upload upstream sync PR artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: upstream-sync-pr-artifacts
          path: |
            reports/upstream-sync-report.json
            reports/upstream-sync-pr-body.md
            reports/upstream-sync-validation-log.json
          if-no-files-found: warn
          retention-days: 14

      - name: Write upstream sync PR summary
        if: always()
        env:
          REGENERATE_OUTCOME: ${{ steps.regenerate.outcome }}
        run: |
          {
            echo "## Upstream Sync PR Validation"
            echo "- branch: \`${{ github.head_ref }}\`"
            echo "- regenerate: \`${REGENERATE_OUTCOME:-unknown}\`"
            if [ -f reports/upstream-sync-validation-log.json ]; then
              node --input-type=module -e 'import fs from "node:fs"; const summary = JSON.parse(fs.readFileSync("reports/upstream-sync-validation-log.json", "utf8")); process.stdout.write(`- overall: \`${summary.status}\`\n`); process.stdout.write(`- ui typecheck: \`${summary.uiTypecheck?.status ?? "not-run"}\`\n`); process.stdout.write(`- server typecheck: \`${summary.serverTypecheck?.status ?? "not-run"}\`\n`); process.stdout.write(`- check:i18n: \`${summary.checkI18n?.status ?? "not-run"}\`\n`);'
            else
              echo "- validation log: not generated"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail when upstream sync PR regeneration breaks
        if: always()
        env:
          REGENERATE_OUTCOME: ${{ steps.regenerate.outcome }}
        run: |
          echo "upstream-sync regenerate outcome: ${REGENERATE_OUTCOME:-<empty>}"
          if [ "$REGENERATE_OUTCOME" = "success" ]; then
            exit 0
          fi

          echo "Dry-run upstream-sync regeneration failed. See uploaded artifacts for details."
          exit 1
